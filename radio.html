<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="manifest" href="R.json">
    <meta charset="UTF-8">
    <title>電台廣播播放器 (完美手機版)</title>
    <!-- 引入播放 M3U8 必備的套件 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        /* 網頁底色設為灰色 */
        body {
            background-color: gray;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        /* 關鍵修正：讓網頁在電腦上也固定呈現手機般窄窄的精緻大小 */
        .container {
            /* 🌟 核心修改： */
            max-width: 680px;        /* 在大螢幕上，最大就只會撐到 1080px，不會無限變寬 */
            width: 95%;               /* 在小螢幕（手機/平板）上，會自動縮小成螢幕寬度的 95%，左右各留一點點安全邊距 */
            
            margin: 0 auto;           /* 依然保持在螢幕正中央置中 */
            background-color: black;  /* 你的黑色內容背景 */
            padding: 20px;          
            min-height: 100vh;        /* 垂直拉滿整個螢幕 */
            box-shadow: 0 0 15px rgba(0,0,0,0.4); 
            box-sizing: border-box;
        }

        .video-list {
            margin-bottom: 20px;
        }

        .video-link {
            display: inline-block;
            margin: 8px 0;
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        .video-link:hover {
            text-decoration: underline;
        }

        /* 關鍵修正：預設設定 display: none 徹底隱形，沒點擊前絕不留下難看的空白 */
        #video-container {
            display: none; 
            margin-top: 20px;
            width: 100%;
        }

        /* 偽裝成純聲音播放器：高度壓到 54px，隱藏黑底影片畫面，只漏出播放控制條 */
        video {
            width: 100%;
            height: 54px;
            background: #000;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <!-- 1. 用 container 把所有內容包起來，手機大小的版型才會生效 -->
    <div class="container">
        
        <h2 style="color:white">網路廣播電台</h2>

        <div class="video-list">
            <!-- 連結 1：KISS RADIO -->
            <p><a href="#" class="video-link" data-src="https://kissradiow-hichannel.cdn.hinet.net/live/RA000040/chunklist.m3u8?token=CiTm-dNiX2dz8UNtc5lFVQ&expires=1778989970">FM 99.9MHz 大眾廣播KISSRADIO</a></p>
            
            <!-- 連結 2：Revma 音訊流 (修正：統一改用 data-src 讓 JS 處理，不開新分頁) -->
            <p><a href="#" class="video-link" data-src="https://n14.rcs.revma.com/s1zttsg3qtzuv?rj-ttl=5&rj-tok=AAABni8CCCQAvCI_1J0Poh2-1A">FM 103.3MHz 中國廣播公司</a></p>
            
            <!-- 連結 3：警察廣播電台高雄台 -->
            <p><a href="#" class="video-link" data-src="https://stream.pbs.gov.tw/live/KSS/playlist.m3u8">FM 93.1MHz 警察廣播電台 高雄分台</a></p>
            <p><a href="#" class="video-link" data-src="ttps://stream.pbs.gov.tw:443/live/mp3:PBS/playlist.m3u8">FM 104.9Mhz 警察廣播電臺 全國治安交通網</a></p>
            <p><a href="#" class="video-link" data-src="http://43.254.16.40:8000/KS.FM98.3">FM 98.3Mhz 港都電台</a></p>
            <p><a href="#" class="video-link" data-src="https://stream.rcs.revma.com/pet2dvug1bkvv/">FM94.3 高雄廣播電臺</a></p>
            <p><a href="#" class="video-link" data-src="https://stream.pbs.gov.tw/live/KSS/playlist.m3u8">FM 93.1MHz 警察廣播電台高雄分台</a></p>

            <p><a href="#" class="video-link" data-src="https://n03.rcs.revma.com/nkdfurztxp3vv?rj-ttl=5&rj-tok=AAABni8VxB8A-yT2sGr5BFyg-w">FM 100.7MHz  International Community Radio Taipei</a></p>
        </div>

        <!-- 2. 平常完全隱藏、不佔空間的容器 -->
        <div id="video-container"></div>

    </div>

    <script>
        let hls = null;

        document.querySelectorAll('.video-link').forEach(link => {
            link.addEventListener('click', function(event) {
                event.preventDefault(); // 阻止網頁跳轉
                
                const videoSrc = this.getAttribute('data-src');
                const container = document.getElementById('video-container');
                
                if (hls) {
                    hls.destroy();
                }

                // 點擊瞬間解除隱形，讓播放條顯示出來
                container.style.display = 'block';

                // 動態產生偽裝成音訊條的 video 標籤
                container.innerHTML = `<video id="active-video" controls autoplay></video>`;
                const video = document.getElementById('active-video');

                // 判斷是否為 M3U8 格式
                if (videoSrc.includes('m3u8')) {
                    if (Hls.isSupported()) {
                        // 🌟 注入跨網域破解參數，提升 Hinet 串流與警廣的播放成功率
                        hls = new Hls({
                            xhrSetup: function (xhr, url) {
                                xhr.withCredentials = false; 
                            }
                        });
                        hls.loadSource(videoSrc);
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => {
                            video.play();
                        });
                    } 
                    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = videoSrc;
                        video.play();
                    }
                } else {
                    // 如果是 Revma 直接音訊流，不需經過 Hls.js，直接餵給標籤播放
                    video.src = videoSrc;
                    video.play();
                }
            });
        });
    </script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('R.js');
  }
</script>
</body>
</html>
