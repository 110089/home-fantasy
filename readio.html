<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>HTTPS M3U8 播放測試</title>
    <!-- 引入 hls.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        video {
            width: 100%;
            max-width: 640px;
            height: auto;
        }
    </style>
</head>
<body>

    <h2>HTTPS M3U8 影片播放器</h2>
    
    <!-- HTML5 video 標籤 -->
    <video id="video" controls autoplay muted></video>

    <script>
        // 請將下方的網址替換成你的 HTTPS M3U8 連結
        const videoSrc = 'https://kissradiow-hichannel.cdn.hinet.net/live/RA000040/chunklist.m3u8?token=CiTm-dNiX2dz8UNtc5lFVQ&expires=1778989970';
        const video = document.getElementById('video');

        if (Hls.isSupported()) {
            // 如果瀏覽器不支援原生播放，但支援 hls.js (如 Chrome, Firefox)
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // 如果瀏覽器原生就支援（例如 Safari）
            video.src = videoSrc;
        }
    </script>

</body>
</html>
